<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Stock Portfolio · equity-agent</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --border: #262626;
      --text-1: #fafafa;
      --text-2: #a1a1aa;
      --text-3: #52525b;
      --green: #10b981;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header .subtitle {
      color: var(--text-2);
      font-size: 13px;
      margin-top: 2px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
    }

    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px 24px;
      margin-bottom: 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .hero-label {
      font-size: 11px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .hero-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-input .dollar { color: var(--text-2); font-size: 16px; }
    .hero-input input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-1);
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      width: 140px;
    }
    .hero-input input:focus { border-color: var(--green); }

    .hero-actions { display: flex; gap: 8px; }

    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      background: var(--text-1);
      color: var(--bg);
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #e5e5e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary {
      background: var(--green);
      color: #0a0a0a;
      font-weight: 600;
      padding: 10px 20px;
    }
    button.primary:hover:not(:disabled) { background: #34d399; }
    button.secondary {
      background: var(--surface);
      color: var(--text-1);
      border: 1px solid var(--border);
    }
    button.secondary:hover:not(:disabled) { background: var(--surface-2); }
    button.ghost {
      background: transparent;
      color: var(--text-2);
      padding: 10px 12px;
    }
    button.ghost:hover:not(:disabled) { color: var(--text-1); }

    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .metric-card {
      background: var(--surface);
      padding: 18px 20px;
    }
    .metric-label {
      font-size: 11px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      font-feature-settings: "tnum";
    }
    .metric-sub {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 4px;
      font-feature-settings: "tnum";
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      color: var(--text-2);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-feature-settings: "tnum";
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }

    .right { text-align: right; }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .muted { color: var(--text-2); }

    .loading, .empty {
      color: var(--text-2);
      font-size: 13px;
      padding: 24px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .error {
      color: var(--red);
      font-size: 13px;
      padding: 20px;
      text-align: center;
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 6px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      font-size: 13px;
      color: var(--text-1);
      max-width: 340px;
      z-index: 100;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 200ms, transform 200ms;
      pointer-events: none;
    }
    .toast.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .toast.success { border-color: rgba(16, 185, 129, 0.35); }
    .toast.error { border-color: rgba(239, 68, 68, 0.35); color: var(--red); }
    .toast .toast-title {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    footer {
      color: var(--text-3);
      font-size: 12px;
      text-align: center;
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--text-2); text-decoration: none; }
    footer a:hover { color: var(--text-1); }

    @media (max-width: 640px) {
      .container { padding: 24px 16px 60px; }
      .hero { flex-direction: column; align-items: stretch; }
      .hero-actions { justify-content: flex-end; }
      tbody td, thead th { padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>AI Stock Portfolio</h1>
        <div class="subtitle">One click. The AI analyses ~130 US stocks and buys the best picks for your budget.</div>
      </div>
      <div class="status"><span class="status-dot"></span><span>Live</span></div>
    </header>

    <div class="hero">
      <div>
        <div class="hero-label">Your money</div>
        <div class="hero-input">
          <span class="dollar">$</span>
          <input type="number" id="capital-amt" min="100" max="100000" step="50" value="500">
        </div>
      </div>
      <div class="hero-actions">
        <button class="primary" id="btn-invest">🚀 Let AI invest</button>
        <button class="secondary" id="btn-rebalance" title="Sell losing picks, buy new ones">Rebalance</button>
        <button class="ghost" id="btn-reset" title="Wipe portfolio without buying anything">Reset</button>
      </div>
    </div>

    <section class="section">
      <div class="section-title">Your portfolio</div>
      <div id="metrics"><div class="loading">Loading…</div></div>
    </section>

    <section class="section">
      <div class="section-title">Stocks you own</div>
      <div id="positions"><div class="loading">Loading…</div></div>
    </section>

    <section class="section">
      <div class="section-title">AI prediction score</div>
      <div id="accuracy"><div class="loading">Loading…</div></div>
    </section>

    <section class="section">
      <div class="section-title">What happened recently</div>
      <div id="trades"><div class="loading">Loading…</div></div>
    </section>

    <footer>
      <a href="/docs">API</a> · <a href="https://github.com/dheepakkaran/equity-agent" target="_blank">GitHub</a> · <a href="#" id="logout-link">Sign out</a>
    </footer>
  </div>

  <div class="toast" id="toast">
    <div class="toast-title" id="toast-title"></div>
    <div id="toast-body"></div>
  </div>

  <script>
  const fmtUsd = (v) => v == null ? "—" : v.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 });
  const fmtPct = (v) => v == null ? "—" : `${v >= 0 ? "+" : ""}${v.toFixed(2)}%`;
  const signCls = (v) => v == null ? "" : v > 0 ? "green" : v < 0 ? "red" : "muted";

  async function fetchJson(url, opts = {}) {
    const r = await fetch(url, opts);
    if (!r.ok) {
      const j = await r.json().catch(() => ({ detail: r.statusText }));
      throw new Error(j.detail || `${url} → ${r.status}`);
    }
    return r.json();
  }

  function toast(kind, title, body, ms = 4500) {
    const t = document.getElementById("toast");
    document.getElementById("toast-title").textContent = title;
    document.getElementById("toast-body").textContent = body;
    t.className = `toast ${kind} visible`;
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { t.className = `toast ${kind}`; }, ms);
  }

  function renderMetrics(p) {
    document.getElementById("metrics").innerHTML = `
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Portfolio worth</div>
          <div class="metric-value">${fmtUsd(p.total_value)}</div>
          <div class="metric-sub">Started with ${fmtUsd(p.initial_capital)}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Profit / loss</div>
          <div class="metric-value ${signCls(p.total_return_usd)}">${p.total_return_usd >= 0 ? "+" : ""}${fmtUsd(p.total_return_usd)}</div>
          <div class="metric-sub ${signCls(p.total_return_pct)}">${fmtPct(p.total_return_pct)}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Cash available</div>
          <div class="metric-value">${fmtUsd(p.cash_balance)}</div>
          <div class="metric-sub">Not invested yet</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Stocks owned</div>
          <div class="metric-value">${p.positions.length}</div>
          <div class="metric-sub">${p.positions.length === 0 ? "Click Let AI invest to start" : "positions open"}</div>
        </div>
      </div>`;
  }

  function renderPositions(p) {
    const el = document.getElementById("positions");
    if (!p.positions.length) {
      el.innerHTML = `<div class="empty">No stocks yet. Set your money above and hit “Let AI invest”.</div>`;
      return;
    }
    const rows = p.positions.map(pos => {
      const pnl = pos.unrealized_pnl_pct;
      const gainTom = pos.expected_gain_tomorrow_usd;
      return `
        <tr>
          <td><strong>${pos.ticker}</strong></td>
          <td class="right num">${pos.shares.toLocaleString()}</td>
          <td class="right num">${fmtUsd(pos.avg_entry_price)}</td>
          <td class="right num">${fmtUsd(pos.current_price)}</td>
          <td class="right num muted">${fmtUsd(pos.predicted_price_tomorrow)}</td>
          <td class="right num ${signCls(gainTom)}">${gainTom != null ? (gainTom >= 0 ? "+" : "") + fmtUsd(gainTom) : "—"}</td>
          <td class="right num ${signCls(pnl)}">${fmtPct(pnl)}</td>
          <td class="right num green">${(pos.rewards_earned || 0)} pts</td>
        </tr>`;
    }).join("");
    el.innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Stock</th>
          <th class="right">Shares</th>
          <th class="right">Bought at</th>
          <th class="right">Today</th>
          <th class="right">AI expects tomorrow</th>
          <th class="right">Predicted gain tomorrow</th>
          <th class="right">Profit / loss</th>
          <th class="right">Reward points</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }

  function renderAccuracy(a) {
    const el = document.getElementById("accuracy");
    if (!a.total_evaluated) {
      el.innerHTML = `<div class="empty">The AI has made predictions today. Results will start scoring in ~7 days once market data confirms them.</div>`;
      return;
    }
    el.innerHTML = `
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Accuracy so far</div>
          <div class="metric-value ${a.overall_accuracy_pct >= 50 ? 'green' : 'red'}">${a.overall_accuracy_pct.toFixed(1)}%</div>
          <div class="metric-sub">${a.correct} correct out of ${a.total_evaluated}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Reward points earned</div>
          <div class="metric-value green">${(a.reward_points || 0).toLocaleString()}</div>
          <div class="metric-sub">+10 per correct, +5 bonus on high-confidence hits</div>
        </div>
      </div>`;
  }

  function renderTrades(trades) {
    const el = document.getElementById("trades");
    if (!trades.length) {
      el.innerHTML = `<div class="empty">No trades yet.</div>`;
      return;
    }
    const rows = trades.slice(0, 12).map(t => {
      const label = { BUY: "Bought", SELL: "Sold", SHORT: "Shorted", COVER: "Covered" }[t.action] || t.action;
      const cls = { BUY: "green", COVER: "green", SELL: "red", SHORT: "red" }[t.action] || "";
      return `
        <tr>
          <td class="muted">${new Date(t.executed_at).toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" })}</td>
          <td><strong>${t.ticker}</strong></td>
          <td class="${cls}">${label}</td>
          <td class="right num">${t.shares.toLocaleString()}</td>
          <td class="right num">${fmtUsd(t.price)}</td>
          <td class="right num ${signCls(t.realized_pnl)}">${t.realized_pnl == null ? "—" : fmtUsd(t.realized_pnl)}</td>
        </tr>`;
    }).join("");
    el.innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr>
          <th>When</th><th>Stock</th><th>What</th>
          <th class="right">Shares</th><th class="right">Price</th>
          <th class="right">Profit realised</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }

  async function refreshPortfolio() {
    try { renderMetrics(await fetchJson("/portfolio")); renderPositions(await fetchJson("/portfolio")); }
    catch (e) { document.getElementById("metrics").innerHTML = `<div class="error">${e.message}</div>`; }
  }
  async function refreshTrades() {
    try { renderTrades(await fetchJson("/portfolio/trades?limit=15")); }
    catch (e) { document.getElementById("trades").innerHTML = `<div class="error">${e.message}</div>`; }
  }
  async function refreshAccuracy() {
    try { renderAccuracy(await fetchJson("/portfolio/accuracy")); }
    catch (e) { document.getElementById("accuracy").innerHTML = `<div class="error">${e.message}</div>`; }
  }

  function currentBudget() {
    const v = parseFloat(document.getElementById("capital-amt").value);
    if (!v || v < 100 || v > 100000) return null;
    return v;
  }

  async function invest() {
    const amt = currentBudget();
    if (amt == null) { toast("error", "Enter an amount", "Between $100 and $100,000"); return; }
    if (!confirm(`Let the AI invest $${amt.toLocaleString()} for you? Any existing positions will be reset first.`)) return;

    const btn = document.getElementById("btn-invest");
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = "Analysing…";
    try {
      const j = await fetchJson(`/portfolio/auto-build?budget=${amt}&max_positions=5&min_confidence=0.55`, { method: "POST" });
      if (!j.executed || j.executed.length === 0) {
        toast("error", "No trades made", j.skipped_reason || "No qualifying picks");
      } else {
        const stocks = j.executed.map(t => t.ticker).join(", ");
        toast("success", `Bought ${j.executed.length} stocks`, `${stocks} · ${fmtUsd(j.total_notional_deployed)} invested`);
      }
      await Promise.all([refreshPortfolio(), refreshTrades(), refreshAccuracy()]);
    } catch (e) {
      toast("error", "Investment failed", e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  }

  async function rebalance() {
    if (!confirm("Rebalance now? Losers get closed and remaining cash buys the AI's best fresh picks.")) return;
    const btn = document.getElementById("btn-rebalance");
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = "Rebalancing…";
    try {
      const j = await fetchJson("/portfolio/rebalance?max_new_positions=3&min_confidence=0.60", { method: "POST" });
      const closed = (j.enforcement_actions || []).length;
      const opened = (j.new_positions || []).length;
      toast("success", "Done", `${closed} closed · ${opened} new`);
      await Promise.all([refreshPortfolio(), refreshTrades(), refreshAccuracy()]);
    } catch (e) {
      toast("error", "Rebalance failed", e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  }

  async function reset() {
    const amt = currentBudget();
    if (amt == null) { toast("error", "Enter an amount", "Between $100 and $100,000"); return; }
    if (!confirm(`Reset the portfolio to $${amt.toLocaleString()} and clear everything? No trades will be made.`)) return;
    try {
      await fetchJson("/portfolio/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ initial_capital: amt }),
      });
      toast("success", "Reset", `Portfolio set to ${fmtUsd(amt)}`);
      await Promise.all([refreshPortfolio(), refreshTrades(), refreshAccuracy()]);
    } catch (e) { toast("error", "Reset failed", e.message); }
  }

  document.getElementById("btn-invest").addEventListener("click", invest);
  document.getElementById("btn-rebalance").addEventListener("click", rebalance);
  document.getElementById("btn-reset").addEventListener("click", reset);
  document.getElementById("logout-link").addEventListener("click", async (e) => {
    e.preventDefault();
    try {
      await fetch("/auth/logout", { method: "POST" });
    } catch {}
    window.location.href = "/login";
  });

  refreshPortfolio();
  refreshTrades();
  refreshAccuracy();
  setInterval(refreshPortfolio, 30000);
  </script>
</body>
</html>
