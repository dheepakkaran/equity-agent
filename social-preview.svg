<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#262626" stroke-width="1" opacity="0.35">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="256" y1="0" x2="256" y2="640"/>
    <line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/>
    <line x1="1024" y1="0" x2="1024" y2="640"/>
  </g>

  <!-- Decorative chart line (right side) -->
  <g opacity="0.85">
    <path d="M 720 460 L 800 420 L 880 440 L 960 380 L 1040 400 L 1120 320 L 1200 340"
          fill="none" stroke="url(#chartLine)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <circle cx="720" cy="460" r="6" fill="#10b981" opacity="0.7"/>
    <circle cx="800" cy="420" r="6" fill="#10b981" opacity="0.7"/>
    <circle cx="880" cy="440" r="6" fill="#10b981" opacity="0.7"/>
    <circle cx="960" cy="380" r="6" fill="#10b981" opacity="0.85"/>
    <circle cx="1040" cy="400" r="6" fill="#10b981" opacity="0.85"/>
    <circle cx="1120" cy="320" r="6" fill="#34d399"/>
    <circle cx="1200" cy="340" r="8" fill="#34d399" filter="url(#glow)"/>
  </g>

  <!-- Content — safe area starts at 60px margin (extra safety over 40pt) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" fill="#fafafa">

    <!-- Emoji/icon -->
    <text x="80" y="150" font-size="72" fill="#10b981">📈</text>

    <!-- Title -->
    <text x="170" y="150" font-size="72" font-weight="700" letter-spacing="-2">equity-agent</text>

    <!-- Tagline -->
    <text x="80" y="220" font-size="30" font-weight="500" fill="#fafafa">One click. AI picks your stocks.</text>
    <text x="80" y="260" font-size="30" font-weight="500" fill="#a1a1aa">Watch profit daily.</text>

    <!-- Feature bullets -->
    <g font-size="20" fill="#a1a1aa">
      <text x="80" y="340">
        <tspan fill="#10b981" font-weight="600">✓</tspan>
        <tspan dx="12" fill="#fafafa" font-weight="500">137-ticker</tspan>
        <tspan dx="6">XGBoost scan</tspan>
      </text>
      <text x="80" y="378">
        <tspan fill="#10b981" font-weight="600">✓</tspan>
        <tspan dx="12" fill="#fafafa" font-weight="500">LangGraph</tspan>
        <tspan dx="6">multi-agent LLM (Gemini)</tspan>
      </text>
      <text x="80" y="416">
        <tspan fill="#10b981" font-weight="600">✓</tspan>
        <tspan dx="12" fill="#fafafa" font-weight="500">Auto-portfolio</tspan>
        <tspan dx="6">with predicted tomorrow price</tspan>
      </text>
      <text x="80" y="454">
        <tspan fill="#10b981" font-weight="600">✓</tspan>
        <tspan dx="12" fill="#fafafa" font-weight="500">Reward points</tspan>
        <tspan dx="6">when the AI gets it right</tspan>
      </text>
    </g>

    <!-- Bottom tech stack strip -->
    <g font-size="16" font-weight="500" letter-spacing="1" fill="#71717a" text-anchor="start">
      <text x="80" y="560" font-family="'SF Mono', Consolas, monospace">FASTAPI · XGBOOST · LANGGRAPH · GEMINI 2.5 · POSTGRES · DOCKER · RENDER</text>
    </g>

    <!-- Live URL badge (bottom right) -->
    <g transform="translate(830, 530)">
      <rect x="0" y="0" width="370" height="52" rx="10" fill="none" stroke="#10b981" stroke-width="2" opacity="0.9"/>
      <text x="20" y="34" font-size="20" font-weight="600" fill="#10b981">🎯</text>
      <text x="60" y="34" font-size="18" font-weight="500" font-family="'SF Mono', Consolas, monospace" fill="#fafafa">
        equity-agent-2lpa.onrender.com
      </text>
    </g>
  </g>
</svg>
