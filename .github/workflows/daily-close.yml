name: Daily close (ingest + enforce + snapshot)

on:
  schedule:
    # 20:15 UTC weekdays = ~4:15 PM ET (after US market close at 4:00 PM ET)
    - cron: "15 20 * * 1-5"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  daily-close:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Gemini not needed for this workflow, but expose it in case future
      # scheduled tasks (e.g. weekly retrain) call agent code
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily close script
        run: python scripts/daily_close.py
